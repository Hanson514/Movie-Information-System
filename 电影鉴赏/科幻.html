<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影鉴赏网站 - 首页</title>
    <style>
    body {
        font-family: 'Microsoft YaHei', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
        color: #333;
    }
a{
text-decoration: none;
color: #333;
}
    header {
        background: linear-gradient(135deg, #032b81, #4fa4dc);
        color: white;
        text-align: center;
        padding: 3em 0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
        margin: 0;
        font-size: 3.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    nav {
        background-color: #689ad2;
        color: white;
    }

    nav ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }

    nav ul li {
        padding: 1.2em;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        transition: all 0.3s ease;
        font-weight: 500;
    }

    nav ul li a:hover {
        color: #FFEB3B;
        transform: translateY(-2px);
        display: inline-block;
    }

    main {
        padding: 3em;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2em;
    }

    .movie-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 2em;
        width: 100%;
    }

    .movie-item {
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: transform 0.3s ease;
    }

    .movie-item img {
     
        width: 100%;
        height: 500px;
        object-fit: cover;
    }

    .movie-item:hover {
        transform: translateY(-5px);
    }

    .movie-item h3 {
        margin: 1em;
        text-align: center;
    }

    footer {
        background: linear-gradient(135deg, #032b81, #4fa4dc);
        color: rgb(250, 247, 247);
        text-align: center;
        padding: 1.5em 0;
        box-shadow: 0 -4px 8px rgba(8, 8, 8, 0.1);
    
     }
     hr {
height: 5px;
border: none;
background-color: rgb(255, 255, 255);
}
img {
    height:600px;
    width:200px;
    object-fit: cover;
}
</style>
</head>

    <main>

                <div class="movie-item">

                    <h3> 星际穿越</h3>
                </div>
            </a>
        
            <a href="./内容/流浪地球1.html">

                    <img src="img/流1.jpg" alt="电影海报">
                    <h3>流浪地球1</h3>
                </div>
            </a>
            <a href="./内容/流浪地球2.html">

                </div>

        </div>
    </main>

</html>
