<html>
<head> <title>表格实例</title><style>
table,th,td{border-top:lpx rgb(126, 185, 212) solid; border-bottom:lpx black solid;}
table{
border-collapse:collapse; margin:20px auto; 
background:aliceblue; width:500px;}
caption{font:36px/2em 楷体;margin:20px 0px 10px;}
th,td{ padding:5px; vertical-align:bottom;
     width:80px;height:50px; text-align:center; font:18px黑体;}
.heading{ background:rgb(86, 181, 207); color:white; font:24px宋体;}
.even{background:rgb(201, 223, 230);} tr:hover{ background:rgb(228, 196, 148);}
</style>
</head>
<body>
<table>
<caption>电影票房排行榜</caption>
<tr><th class="heading">排名</th><th class="heading">中文名</th><th class="heading">产地</th><th class="heading">票房</th></tr>
<tr class="even"><td>1</td><td>哪吒之魔童闹海</td><td>中国</td><td>83亿(中国内地)</td></tr>
<tr><td>2</td><td>哪吒之魔童降世</td><td>中国</td><td>50.35亿(中国内地)</td></tr>
<tr class="even"><td>3</td><td>流浪地球1</td><td>中国</td><td>46.86亿（中国内地）</td></tr>
<tr><td>4</td><td>盗梦空间</td><td>美国</td><td>全球8.26亿美元</td></tr>
<tr class="even"><td>5</td><td>星际穿越</td><td>美国</td><td>中国内地累计超7亿</td></tr>
<tr><td>6</td><td>千与千寻</td><td>日本</td><td>全球316.8亿日元</td></tr>
<tr class="even"><td>7</td><td>流浪地球2</td><td>中国</td><td>23亿</td></tr>
<tr><td>8</td><td>蝴蝶效应 </td><td>美国 </td><td>全球9606万美元</td></tr>
<tr class="even"><td>9</td><td> 看不见的客人</td><td>西班牙</td><td>全球3119万美元</td></tr>
</table>
</body>
</html>
